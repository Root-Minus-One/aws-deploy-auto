name: Build & Deploy to AWS ECS

on:
  push:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_BACKEND_REPO: ${{ secrets.ECR_BACKEND_REPO }}
  ECR_FRONTEND_REPO: ${{ secrets.ECR_FRONTEND_REPO }}
  ECR_GRAFANA_REPO: ${{ secrets.ECR_GRAFANA_REPO }}
  ECS_CLUSTER: gemini-chat-cluster
  ECS_BACKEND_SERVICE: gemini-chat-backend-service
  ECS_FRONTEND_SERVICE: gemini-chat-frontend-service
  ECS_GRAFANA_SERVICE: gemini-chat-grafana-service
  ECS_BACKEND_TASK: gemini-chat-backend-task
  ECS_FRONTEND_TASK: gemini-chat-frontend-task
  ECS_GRAFANA_TASK: gemini-chat-grafana-task

jobs:
  # ────────────────── Build & Push Backend ──────────────────
  build-backend:
    name: 🐍 Build & Push Backend
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏗️ Build, tag, and push backend image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_BACKEND_REPO:latest .
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:latest
          echo "image=$ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ────────────────── Build & Push Frontend ──────────────────
  build-frontend:
    name: ⚛️ Build & Push Frontend
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏗️ Build, tag, and push frontend image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd frontend
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.API_URL }} \
            -t $ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG .
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.API_URL }} \
            -t $ECR_REGISTRY/$ECR_FRONTEND_REPO:latest .
          docker push $ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_FRONTEND_REPO:latest
          echo "image=$ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ────────────────── Build & Push Grafana ──────────────────
  build-grafana:
    name: 📊 Build & Push Grafana
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏗️ Build, tag, and push grafana image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd grafana
          docker build -t $ECR_REGISTRY/$ECR_GRAFANA_REPO:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_GRAFANA_REPO:latest .
          docker push $ECR_REGISTRY/$ECR_GRAFANA_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_GRAFANA_REPO:latest
          echo "image=$ECR_REGISTRY/$ECR_GRAFANA_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ────────────────── Deploy to ECS ──────────────────
  deploy:
    name: 🚀 Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-grafana]

    steps:
      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 📋 Get current backend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_BACKEND_TASK \
            --query 'taskDefinition' \
            --output json > backend-task-def.json

      - name: 🔄 Update backend task definition with new image
        id: backend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend-task-def.json
          container-name: backend
          image: ${{ needs.build-backend.outputs.image }}

      - name: 🚀 Deploy backend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.backend-task-def.outputs.task-definition }}
          service: ${{ env.ECS_BACKEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: 📋 Get current frontend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_FRONTEND_TASK \
            --query 'taskDefinition' \
            --output json > frontend-task-def.json

      - name: 🔄 Update frontend task definition with new image
        id: frontend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend-task-def.json
          container-name: frontend
          image: ${{ needs.build-frontend.outputs.image }}

      - name: 🚀 Deploy frontend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.frontend-task-def.outputs.task-definition }}
          service: ${{ env.ECS_FRONTEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: 📋 Get current grafana task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_GRAFANA_TASK \
            --query 'taskDefinition' \
            --output json > grafana-task-def.json

      - name: 🔄 Update grafana task definition with new image
        id: grafana-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: grafana-task-def.json
          container-name: grafana
          image: ${{ needs.build-grafana.outputs.image }}

      - name: 🚀 Deploy grafana to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.grafana-task-def.outputs.task-definition }}
          service: ${{ env.ECS_GRAFANA_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: ✅ Deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Deployment Complete!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Backend:  ${{ needs.build-backend.outputs.image }}"
          echo "  Frontend: ${{ needs.build-frontend.outputs.image }}"
          echo "  Grafana:  ${{ needs.build-grafana.outputs.image }}"
          echo "  Cluster:  $ECS_CLUSTER"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
